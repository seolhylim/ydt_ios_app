name: iOS Official Signed Build
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Cap Sync
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      # 1. 安装证书（官方动作，稳定无坑）
      - name: Install Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_P12 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      # 2. 安装描述文件（用你正确生成的 base64）
      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > dev.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" dev.mobileprovision)
          cp dev.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 3. 编译并签名
      - name: Xcode Archive & Export
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

          /usr/libexec/PlistBuddy -c "Add :method string development" \
            -c "Add :signingStyle string automatic" \
            -c "Add :teamID string ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            export_options.plist

          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/Output \
            -exportOptionsPlist export_options.plist

      # 4. 上传最终IPA
      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signed-IPA
          path: ios/App/build/Output/App.ipa
