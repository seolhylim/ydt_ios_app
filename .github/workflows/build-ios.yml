name: Build iOS App (Final Fixed)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # 🔥 重点：修复cap脚本权限问题
      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      - name: Install Cert & Provision
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > app.p12
          echo "${{ secrets.IOS_PROV_BASE64 }}" | base64 --decode > app.mobileprovision

          security create-keychain -p temp12345 build.keychain
          security unlock-keychain -p temp12345 build.keychain
          security default-keychain -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp12345 build.keychain

          security import app.p12 -k build.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -f pkcs12

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" app.mobileprovision)
          cp app.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Xcode Archive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # 🔥 用PlistBuddy生成，彻底避开XML/缩进所有坑
      - name: Export IPA
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Add :method string development" \
                               -c "Add :signingStyle string manual" \
                               -c "Add :teamID string ${{ secrets.APPLE_TEAM_ID }}" \
                               -c "Add :compileBitcode bool false" \
                               export_options.plist

          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/Output \
            -exportOptionsPlist export_options.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: App.ipa
          path: ios/App/build/Output/App.ipa
