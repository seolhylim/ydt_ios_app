name: Build iOS + Upload to Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      - name: Build archive NO SIGNING
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build IPA manually
        run: |
          cd ios/App
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r My-IPA.ipa Payload/

      # 🔥 自动发布到 GitHub Releases（下载超级快）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ios/App/My-IPA.ipa
          tag_name: v1.0.0
          name: iOS IPA 安装包
          body: 由 GitHub Actions 自动构建
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
