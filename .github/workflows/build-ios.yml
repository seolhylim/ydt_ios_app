name: Build iOS with Signing (FINAL ✅)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      - name: Install p12 & Provisioning Profile
        run: |
          # 1. 解码证书和描述文件
          echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 -d > dist.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > profile.mobileprovision

          # 2. 创建并解锁钥匙串（安装证书）
          security create-keychain -p temp123 temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp123 temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security import dist.p12 -k temp.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -A -f pkcs12

          # 3. 【核心修复】安装描述文件（用 PlistBuddy 读取 UUID）
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" profile.mobileprovision)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build archive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }} \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist <(echo '{"method":"ad-hoc","signingStyle":"manual"}')

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: My-IPA
          path: ios/App/build/ipa/App.ipa
