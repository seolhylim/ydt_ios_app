name: iOS Signed Build (Fastlane)
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Cap Sync
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      # 安装 Fastlane（官方推荐的 CI 工具）
      - name: Install Fastlane
        run: |
          gem install fastlane

      # 配置 Fastlane 环境变量
      - name: Setup Fastlane Env
        run: |
          echo "APPLE_KEYCHAIN_PASSWORD=temp123" >> $GITHUB_ENV
          echo "IOS_P12_BASE64=${{ secrets.IOS_DISTRIBUTION_P12 }}" >> $GITHUB_ENV
          echo "IOS_P12_PASSWORD=${{ secrets.IOS_P12_PASSWORD }}" >> $GITHUB_ENV
          echo "IOS_PROVISIONING_PROFILE_BASE64=${{ secrets.IOS_PROVISIONING_PROFILE }}" >> $GITHUB_ENV

      # 用 Fastlane 安装证书和描述文件（最稳定的方式）
      - name: Fastlane Match Setup
        run: |
          cd ios/App
          fastlane run import_cert \
            cert_data:"${{ secrets.IOS_DISTRIBUTION_P12 }}" \
            cert_password:"${{ secrets.IOS_P12_PASSWORD }}" \
            keychain_name:"fastlane-build.keychain" \
            keychain_password:"temp123"

          fastlane run import_provisioning_profile \
            profile_data:"${{ secrets.IOS_PROVISIONING_PROFILE }}"

      # 编译并导出 IPA
      - name: Xcode Archive & Export
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

          /usr/libexec/PlistBuddy -c "Add :method string development" \
            -c "Add :signingStyle string automatic" \
            -c "Add :teamID string ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            export_options.plist

          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/Output \
            -exportOptionsPlist export_options.plist

      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signed-IPA
          path: ios/App/build/Output/App.ipa
