name: Build iOS STANDARD (for Sideloadly)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      # 1. 编译生成 xcarchive（标准方式）
      - name: Build archive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS

      # 2. 标准导出 IPA（Sideloadly 100% 兼容）
      - name: Export standard IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist <(echo '{
              "destination":"export",
              "method":"development",
              "signingStyle":"automatic",
              "compileBitcode":false
            }')

      # 3. 上传标准 IPA
      - name: Upload Standard IPA
        uses: actions/upload-artifact@v4
        with:
          name: My-IPA-Standard
          path: ios/App/build/ipa/App.ipa
