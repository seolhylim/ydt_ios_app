name: Build iOS FOR SIDELOADLY ✅
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      # 1. 无签名编译（你已经验证过这个能跑通）
      - name: Build archive NO SIGNING
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 2. 生成标准格式 IPA（Payload/ + zip）
      - name: Build standard IPA
        run: |
          cd ios/App
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          # 关键：必须用 zip -r 递归压缩，且压缩根目录必须是 Payload
          zip -r App.ipa Payload/

      # 3. 上传标准 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: App
          path: ios/App/App.ipa
