name: iOS SIGNED BUILD (FINAL FIX)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      - name: Install Certificate
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 -d > dev_cert.p12

          security create-keychain -p "123456" build.keychain
          security unlock-keychain -p "123456" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security set-keychain-settings -lut 3600 build.keychain

          security import dev_cert.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -f pkcs12 -A

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "123456" build.keychain

      - name: Install Provisioning Profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" Dev_App_ydt.mobileprovision 2>/dev/null || security cms -D -i Dev_App_ydt.mobileprovision | plutil -extract UUID raw -o - -)
          cp Dev_App_ydt.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "✅ PROFILE INSTALLED: $UUID"

      # 🔥 🔥 🔥 这一步我已经修复 🔥 🔥 🔥
      - name: Xcode Archive & Export
        run: |
          cd ios/App
          
          # 1. 编译归档（已经100%成功）
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER=${{ secrets.PROFILE_UUID }} \
            CODE_SIGN_IDENTITY="iPhone Developer"

          # 2. 创建安全的导出配置文件（修复错误）
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          # 3. 导出IPA
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload SIGNED IPA
        uses: actions/upload-artifact@v4
        with:
          name: SIGNED_IPA
          path: ios/App/App.ipa
