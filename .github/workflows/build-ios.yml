name: iOS Signed Build
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Cap Sync
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      # 安装证书和描述文件
      - name: Install Cert & Profile
        run: |
          echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 -d > dev.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > dev.mobileprovision

          # 创建并配置钥匙串
          security create-keychain -p temp123 build.keychain
          security unlock-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple:,apple-tool:,codesign: -s -k temp123 build.keychain

          # 导入证书
          security import dev.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -f pkcs12

          # 安装描述文件
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" dev.mobileprovision)
          cp dev.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 编译并签名
      - name: Xcode Archive & Export
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

          /usr/libexec/PlistBuddy -c "Add :method string development" \
            -c "Add :signingStyle string manual" \
            -c "Add :teamID string ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            export_options.plist

          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/Output \
            -exportOptionsPlist export_options.plist

      # 上传最终IPA
      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signed-IPA
          path: ios/App/build/Output/App.ipa
