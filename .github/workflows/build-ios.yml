name: Build iOS STANDARD (✅ 证书签名版)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      # 1. 安装证书和描述文件（你提供的）
      - name: Install Certificate & Provisioning Profile
        run: |
          # 解码 p12 证书
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > ydt_distribution.p12
          # 解码描述文件
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 -d > ydt_discription.mobileprovision

          # 创建临时钥匙串并解锁
          security create-keychain -p buildpass build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p buildpass build.keychain

          # 导入 p12 证书
          security import ydt_distribution.p12 -k build.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -A

          # 安装描述文件到系统目录
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" ydt_discription.mobileprovision)
          cp ydt_discription.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 2. 带团队 ID 的标准打包
      - name: Build & Archive with Team
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      # 3. 导出标准 IPA（适配 TestFlight / Sideloadly）
      - name: Export IPA
        run: |
          cd ios/App
          # 创建标准 ExportOptions.plist
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>compileBitcode</key>
              <false/>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

          # 导出
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      # 4. 上传最终标准 IPA
      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: Final-Standard-IPA
          path: ios/App/build/ipa/App.ipa
