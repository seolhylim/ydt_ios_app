name: Build iOS (FINAL - Direct .app to IPA)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      # 🔥 编译（无签名，已成功）
      - name: Build archive NO SIGNING
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 🔥 直接把 .app 打包成 IPA（跳过 xcodebuild export）
      - name: Build IPA manually
        run: |
          cd ios/App
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r My-IPA.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: My-IPA
          path: ios/App/My-IPA.ipa
