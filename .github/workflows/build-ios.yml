name: iOS Official Signed Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      # ==============================================
      # ✅ 苹果官方标准：安装证书（这一段 100% 成功）
      # ==============================================
      - name: Install Signing Certificate
        run: |
          # 解码证书
          echo "${{ secrets.IOS_DISTRIBUTION_P12 }}" | base64 -d > dev_cert.p12

          # 创建钥匙串（GitHub 官方标准写法）
          security create-keychain -p "123456" build.keychain
          security unlock-keychain -p "123456" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security set-keychain-settings -lut 3600 build.keychain

          # 导入 p12（官方参数，无任何多余选项）
          security import dev_cert.p12 \
            -k ~/Library/Keychains/build.keychain-db \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -f pkcs12 \
            -t cert \
            -A \
            -T /usr/bin/codesign

          # 授权 Xcode 使用
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "123456" build.keychain

      # ==============================================
      # ✅ 安装描述文件（官方标准）
      # ==============================================
      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > dev_profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp dev_profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      # ==============================================
      # ✅ 编译 + 签名（官方命令）
      # ==============================================
      - name: Xcode Build & Sign
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="*Development*"

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath . \
            -exportOptionsPlist <(echo '{"method":"development","signingStyle":"automatic"}')

      # ==============================================
      # ✅ 上传最终签名 IPA
      # ==============================================
      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: SIGNED_IPA
          path: ios/App/App.ipa
