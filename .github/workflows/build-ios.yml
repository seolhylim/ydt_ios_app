name: Build iOS FOR SIDELOADLY ✅
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync iOS project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync ios

      # 🔥 编译成功（你已经验证过）
      - name: Build archive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 🔥 直接生成 Sideloadly 专用格式 IPA
      - name: Make Sideloadly IPA
        run: |
          cd ios/App
          mkdir Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -ry9 App.ipa Payload/

      # 🔥 上传可直接安装的包
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: App
          path: ios/App/App.ipa
