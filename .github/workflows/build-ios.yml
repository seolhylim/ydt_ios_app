name: iOS Signed Build
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Cap Sync
        run: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios

      # 1. 用官方动作安装证书（彻底解决钥匙串问题）
      - name: Install Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_P12 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      # 2. 用官方动作安装描述文件（彻底解决解码问题）
      - name: Install Provisioning Profile
        uses: apple-actions/import-provisioning-profile@v1
        with:
          provisioning-profile-base64: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      # 3. 编译并签名
      - name: Xcode Archive & Export
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

          /usr/libexec/PlistBuddy -c "Add :method string development" \
            -c "Add :signingStyle string automatic" \
            -c "Add :teamID string ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            export_options.plist

          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/Output \
            -exportOptionsPlist export_options.plist

      # 4. 上传签名IPA
      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signed-IPA
          path: ios/App/build/Output/App.ipa
