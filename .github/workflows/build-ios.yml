name: Cert Debug
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug Cert
        run: |
          echo "=== 1. Decoding p12 ==="
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > cert.p12
          ls -la cert.p12
          file cert.p12

          echo "=== 2. Creating keychain ==="
          security create-keychain -p temp123 build.keychain
          security unlock-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple:,apple-tool:,codesign: -s -k temp123 build.keychain

          echo "=== 3. Importing p12 ==="
          security import cert.p12 -k build.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -A -v
          security find-identity -v build.keychain
